apiVersion: v2
name: access-node
description: Umbrella Chart for the DOME Marketplace access-node
type: application
version: 1.3.4-PRE-104
appVersion: 0.0.1
dependencies:
  - name: desmos
    condition: desmos.enabled
    repository: https://in2workspace.github.io/helm-charts
    version: 1.1.4
  - name: dlt-adapter
    alias: dlt-adapter-alastria
    condition: dlt-adapter-alastria.enabled
    repository: https://alastria.github.io/helm-charts
    version: 8.0.0
  - name: dlt-adapter
    alias: dlt-adapter-hashnet
    condition: dlt-adapter-hashnet.enabled
    repository: https://alastria.github.io/helm-charts
    version: 8.0.0
  - name: dome-ied
    condition: dome-ied.enabled
    repository: https://alastria.github.io/helm-charts
    version: 1.0.0
  - name: kafka
    condition: kafka.enabled
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 26.0.0
  - name: postgresql
    condition: postgis.enabled
    alias: postgis
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 13.1.5
  - name: postgresql
    condition: postgresql.enabled
    alias: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 13.1.5
  - name: scorpio-broker-aaio
    condition: scorpio.enabled
    alias: scorpio
    repository: https://fiware.github.io/helm-charts
    version: 0.4.9
  - name: tm-forum-api
    condition: tm-forum-api.enabled
    repository: https://dome-marketplace.github.io/tm-forum-charts
    version: 0.14.23
